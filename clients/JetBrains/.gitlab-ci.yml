workflow:
  rules:
    - when: always


stages:
  - lint
  - test
#  - release

linting:
  stage: lint
  image: gradle:9.0.0-jdk21-alpine
  #pull_policy: if-not-present
  script:
    - echo "running ktlint..."
    - cd clients/JetBrains/go-text-template
    - ./gradlew ktlintCheck

testing:
  stage: test
  image: gradle:9.0.0-jdk21-alpine
  before_script:
    - apk add --no-cache gcompat libc6-compat
    - apk add npm
  script:
    - echo "running tests"
    - npm install
    - cd clients/JetBrains/go-text-template
    - ./gradlew test --no-configuration-cache
workflow:
  rules:
    - when: always


stages:
  - lint
  - test
#  - release

linting:
  stage: lint
  image: gradle:9.0.0-jdk21-alpine
  #pull_policy: if-not-present
  script:
    - echo "running ktlint..."
    - cd clients/JetBrains/go-text-template
    - ./gradlew ktlintCheck

testing:
  stage: test
  image: gradle:9.0.0-jdk21-alpine
  before_script:
    - apk update
    - apk upgrade
    - apk add --no-cache gcompat libc6-compat
    - apk add --no-cache --repository=https://dl-cdn.alpinelinux.org/alpine/edge/main --repository=https://dl-cdn.alpinelinux.org/alpine/edge/community nodejs npm
    - npm install
  script:
    - echo "running tests"
    - cd clients/JetBrains/go-text-template
    - ./gradlew test --no-configuration-cache

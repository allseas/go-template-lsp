stages:
  - lint
  - test
#  - release

linting:
  stage: lint
  image: gradle:9.0.0-jdk21-alpine
  #pull_policy: if-not-present
  script:
    echo "running ktlint..."
    cd go-text-template
    ./gradlew ktlintCheck

testing:
  stage: test
  image: gradle:9.0.0-jdk21-alpine
  script:
    echo "running tests"
    cd go-text-template
    ./gradlew test
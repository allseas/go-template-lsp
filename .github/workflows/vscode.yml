name: vscode

on:
  push:
    branches: [main, master]
    paths:
      - "clients/VSCode/**"
      - "server/**"
      - "test/testcases/**"
      - ".github/workflows/vscode.yml"
  pull_request:
    paths:
      - "clients/VSCode/**"
      - "server/**"
      - "test/testcases/**"
      - ".github/workflows/vscode.yml"
  workflow_dispatch:

concurrency:
  group: vscode-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.img.outputs.image }}
    steps:
      - id: img
        run: echo "image=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/vscode-ci:latest" >> "$GITHUB_OUTPUT"

  build-image:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: clients/VSCode/
          push: true
          tags: ${{ needs.prepare.outputs.image }}
          cache-from: type=gha,scope=vscode-ci
          cache-to: type=gha,mode=max,scope=vscode-ci

  linting:
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - name: Running TSESLint
        run: npm run lint:check -w clients/VSCode

  formatting:
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - name: Running Prettier
        run: npm run format:check -w clients/VSCode

  testing:
    needs: [prepare, build-image]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      GO_VERSION: "1.26.2"
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps & Go
        run: |
          apt-get update
          apt-get upgrade -y
          apt-get install -y --no-install-recommends xvfb xauth chromium curl ca-certificates
          if ! /usr/local/go/bin/go version >/dev/null 2>&1; then
            echo "Installing Go ${GO_VERSION}"
            curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
            rm -rf /usr/local/go
            tar -C /usr/local -xzf /tmp/go.tar.gz
            rm -f /tmp/go.tar.gz
          fi
          /usr/local/go/bin/go version
      - name: npm ci
        run: npm ci
      - name: Running tests
        run: |
          export PATH="/usr/local/go/bin:$PATH"
          xvfb-run --server-args="-screen 0 1920x1080x24" npm test -w clients/VSCode


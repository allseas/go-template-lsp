name: jetbrains

on:
  push:
    branches: [main, master]
    paths:
      - "clients/JetBrains/**"
      - "server/**"
      - "test/testcases/**"
      - ".github/workflows/jetbrains.yml"
  pull_request:
    paths:
      - "clients/JetBrains/**"
      - "server/**"
      - "test/testcases/**"
      - ".github/workflows/jetbrains.yml"
  workflow_dispatch:

concurrency:
  group: jetbrains-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # Compute lowercase image base path (ghcr.io requires lowercase)
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.img.outputs.image }}
    steps:
      - id: img
        run: echo "image=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/jetbrains-ci:latest" >> "$GITHUB_OUTPUT"

  build-image:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: clients/JetBrains/
          push: true
          tags: ${{ needs.prepare.outputs.image }}
          cache-from: type=gha,scope=jetbrains-ci
          cache-to: type=gha,mode=max,scope=jetbrains-ci

  linting:
    needs: [prepare, build-image]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Running ktlint
        working-directory: clients/JetBrains/go-text-template
        run: ./gradlew ktlintCheck --no-configuration-cache

  testing:
    needs: [prepare, build-image]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: npm ci
        run: npm ci
      - name: Running tests (default build)
        working-directory: clients/JetBrains/go-text-template
        run: ./gradlew test --build-cache --parallel --max-workers=4 --no-watch-fs --no-configuration-cache
      - name: Running tests (allseas build)
        working-directory: clients/JetBrains/go-text-template
        run: ./gradlew test --build-cache --parallel --max-workers=4 --no-watch-fs --no-configuration-cache -Pallseas --rerun-tasks


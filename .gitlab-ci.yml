workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - setup
  - triggers
  - release

default:
  interruptible: true

pipeline-initialized:
  stage: setup
  script:
    - echo "Pipeline triggered successfully."

trigger-jetbrains:
  stage: triggers
  trigger:
    include: clients/JetBrains/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - clients/JetBrains/**/*
        - server/**/*

trigger-vscode:
  stage: triggers
  trigger:
    include: clients/VSCode/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - clients/VSCode/**/*
        - server/**/*

trigger-server:
  stage: triggers
  trigger:
    include: server/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - server/**/*

trigger-parse:
  stage: triggers
  trigger:
    include: parse/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
      - parse/**/*

release-build:
  stage: release
  image: node:24-alpine
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  before_script:
    - apk add --no-cache curl
    - curl -fsSL "https://go.dev/dl/go1.26.2.linux-amd64.tar.gz" | tar -xz -C /usr/local
    - export PATH="/usr/local/go/bin:$PATH"
    - curl -fsSL "https://aka.ms/download-jdk/microsoft-jdk-21-linux-x64.tar.gz" | tar -xz -C /usr/local
    - export JAVA_HOME="$(find /usr/local -maxdepth 1 -type d -name 'jdk-21*' | head -n 1)"
    - export PATH="$JAVA_HOME/bin:$PATH"
    - npm ci
  script:
    - npm run package:both
  artifacts:
    paths:
      - "*.vsix"
      - "go-template-jetbrains.zip"

release-publish:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  needs:
    - job: release-build
      artifacts: true
  script:
    - VSIX_FILE=$(find . -maxdepth 1 -name '*.vsix' | head -1)
    - JETBRAINS_ZIP="go-template-jetbrains.zip"
    - export GLAB_ENABLE_CI_AUTOLOGIN=true
    - |
      glab release create "${CI_COMMIT_TAG}" \
        --name "Release ${CI_COMMIT_TAG}" \
        --notes "Release ${CI_COMMIT_TAG}"
    - |
      glab release upload "${CI_COMMIT_TAG}" "${VSIX_FILE}" \
        --use-package-registry
    - |
      glab release upload "${CI_COMMIT_TAG}" "${JETBRAINS_ZIP}" \
        --use-package-registry

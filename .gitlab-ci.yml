workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - setup
  - triggers
  - release

default:
  interruptible: true

pipeline-initialized:
  stage: setup
  script:
    - echo "Pipeline triggered successfully."

trigger-jetbrains:
  stage: triggers
  trigger:
    include: clients/JetBrains/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - clients/JetBrains/**/*

trigger-vscode:
  stage: triggers
  trigger:
    include: clients/VSCode/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - clients/VSCode/**/*

trigger-server:
  stage: triggers
  trigger:
    include: server/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - server/**/*

trigger-parse:
  stage: triggers
  trigger:
    include: parse/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
      - parse/**/*

release-build:
  stage: release
  image: node:24-alpine
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - when: manual
  before_script:
    - apk add --no-cache curl
    - curl -fsSL "https://go.dev/dl/go1.26.2.linux-amd64.tar.gz" | tar -xz -C /usr/local
    - export PATH="/usr/local/go/bin:$PATH"
    - npm install
  script:
    - npm run build:server && npm run package:no-verify -w clients/VSCode
  artifacts:
    paths:
      - "*.vsix"

release-publish:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  needs:
    - job: release-build
      artifacts: true
  script:
    - VSIX_FILE=$(find . -maxdepth 1 -name '*.vsix' | head -1)
    - export GLAB_ENABLE_CI_AUTOLOGIN=true
    - |
      glab release create "${CI_COMMIT_TAG}" "${VSIX_FILE}" \
        --name "Release ${CI_COMMIT_TAG}" \
        --notes "Release ${CI_COMMIT_TAG}"

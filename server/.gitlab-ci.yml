workflow:
  rules:
    - when : always

stages:
  - lint
  - test

default:
  interruptible: true

linting:
  stage: lint
  image: golangci/golangci-lint:v2.11.4-alpine
  script:
    - echo "Running Golangci-lint"
    - cd server
    - golangci-lint run --timeout=5m

testing:
  stage: test
  image: golang:tip-alpine3.23
  script:
    - echo "Running Tests"
    - cd server
    - go test -coverprofile=coverage.out
    - |
      COVER_OUTPUT=$(go tool cover -func=coverage.out)
      echo "$COVER_OUTPUT"
      COVERAGE=$(echo "$COVER_OUTPUT" | grep '^total:' | awk '{print $3}' | tr -d '%')
      echo "Total coverage: ${COVERAGE}%"
      awk "BEGIN { if (${COVERAGE} < 90) { print \"Coverage ${COVERAGE}% is below the required 90%\"; exit 1 } }"

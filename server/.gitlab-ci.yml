workflow:
  rules:
    - when : always

stages:
  - lint
  - test

default:
  interruptible: true

linting:
  stage: lint
  image: golangci/golangci-lint:v2.11.4-alpine
  script:
    - echo "Running Golangci-lint"
    - cd server
    - golangci-lint run --timeout=5m

testing:
  stage: test
  image: golang:tip-alpine3.23
  cache:
    key:
      files:
        - server/go.sum
    paths:
      - .go/pkg/mod/
  variables:
    GOPATH: $CI_PROJECT_DIR/.go
  script:
    - echo "Running Tests"
    - cd server
    - go mod download
    - go test ./... -coverprofile=coverage.out
    - grep -v -E '/(parse|types)/node\.go:' coverage.out > coverage.filtered.out
    - mv coverage.filtered.out coverage.out
    - |
      COVER_OUTPUT=$(go tool cover -func=coverage.out)
      echo "$COVER_OUTPUT"
      COVERAGE=$(echo "$COVER_OUTPUT" | grep '^total:' | awk '{print $3}' | tr -d '%')
      echo "Total coverage: ${COVERAGE}%"
      awk "BEGIN { if (${COVERAGE} < 80) { print \"Coverage ${COVERAGE}% is below the required 80%\"; exit 1 } }"
